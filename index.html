<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadership Blueprint | Simple, Actionable Models</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
            background: var(--bg);
        }
        header {
            text-align: center;
            margin-bottom: 5rem;
        }
        h1 { 
            font-size: 3rem; 
            font-weight: 800;
            margin: 0; 
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle { 
            color: var(--text-dim); 
            font-size: 1.25rem;
            margin-top: 1rem; 
        }
        #model-list {
            display: grid;
            gap: 2rem;
        }
        .model-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-decoration: none;
            display: block;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .model-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to right, var(--accent), #818cf8);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .model-card:hover { 
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .model-card:hover::before { opacity: 1; }
        .model-card h2 { 
            margin: 0 0 1rem 0; 
            font-size: 1.75rem;
            font-weight: 700;
        }
        .model-card p {
            color: var(--text-dim);
            margin: 0;
            font-size: 1.1rem;
        }
        .tag {
            display: inline-block;
            font-size: 0.7rem;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        footer {
            margin-top: 8rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-dim);
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Leadership Blueprint</h1>
        <p class="subtitle">Actionable frameworks for daily work. New model every 48 hours.</p>
    </header>

    <main id="model-list">
        <!-- New models will be injected here -->
        <a href="models/situational-leadership.html" class="model-card">
            <span class="tag">Active</span>
            <h2>Situational Leadership (Hersey-Blanchard)</h2>
            <p>Adapt your management style to the maturity and skill level of your team members.</p>
        </a>
    </main>

    <footer>
        &copy; 2026 Leadership Blueprint. Original content curated by Aurora.
    </footer>
</body>
</html>
