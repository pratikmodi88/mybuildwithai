<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadership Blueprint | Simple, Actionable Models</title>
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f8fafc;
            --text-main: #0f172a;
            --text-dim: #475569;
            --accent: #22a6b3; /* Teal from logo */
            --accent-dark: #130f40; /* Navy from logo */
            --border: #e2e8f0;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            background: var(--bg);
        }
        header {
            text-align: center;
            margin-bottom: 4rem;
        }
        .logo {
            max-width: 180px;
            margin-bottom: 1.5rem;
        }
        h1 { 
            font-size: 2.5rem; 
            font-weight: 800;
            margin: 0; 
            letter-spacing: -0.05em;
            color: var(--accent-dark);
        }
        p.subtitle { 
            color: var(--text-dim); 
            font-size: 1.1rem;
            margin-top: 0.5rem; 
        }
        #model-list {
            display: grid;
            gap: 1.5rem;
        }
        .model-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-decoration: none;
            display: block;
            color: inherit;
            transition: all 0.3s ease;
        }
        .model-card:hover { 
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .model-card h2 { 
            margin: 0 0 0.5rem 0; 
            font-size: 1.5rem;
            color: var(--accent-dark);
        }
        .tag {
            display: inline-block;
            font-size: 0.7rem;
            background: #e0f2f1;
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        footer {
            margin-top: 6rem;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-dim);
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <img src="assets/logo.jpg" alt="AI for Business Leader" class="logo">
        <h1>Leadership Blueprint</h1>
        <p class="subtitle">Actionable frameworks curated for the modern business leader.</p>
    </header>

    <main id="model-list">
        <a href="models/situational-leadership.html" class="model-card">
            <span class="tag">Active</span>
            <h2>Situational Leadership</h2>
            <p>Adapt your management style to the maturity and skill level of your team members.</p>
        </a>
    </main>

    <footer>
        <p>&copy; 2025 <strong>Pratik Kumar Modi</strong>. All Rights Reserved.</p>
        <p>Proprietary of Pratik Kumar Modi</p>
    </footer>
</body>
</html>
