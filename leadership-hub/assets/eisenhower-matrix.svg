<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#161b22" rx="12"/>
  <line x1="300" y1="50" x2="300" y2="350" stroke="#30363d" stroke-width="2"/>
  <line x1="100" y1="200" x2="500" y2="200" stroke="#30363d" stroke-width="2"/>
  
  <text x="300" y="380" fill="#7d8590" font-family="Inter, sans-serif" font-size="12" text-anchor="middle">URGENCY &rarr;</text>
  <text x="20" y="200" fill="#7d8590" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90 20,200)">IMPORTANCE &rarr;</text>
  
  <rect x="110" y="60" width="180" height="130" rx="8" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e"/>
  <text x="200" y="115" fill="#fff" font-family="Inter, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">SCHEDULE</text>
  <text x="200" y="145" fill="#7d8590" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Important / Not Urgent</text>
  
  <rect x="310" y="60" width="180" height="130" rx="8" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444"/>
  <text x="400" y="115" fill="#fff" font-family="Inter, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">DO FIRST</text>
  <text x="400" y="145" fill="#7d8590" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Important / Urgent</text>
  
  <rect x="110" y="210" width="180" height="130" rx="8" fill="rgba(107, 114, 128, 0.1)" stroke="#6b7280"/>
  <text x="200" y="265" fill="#fff" font-family="Inter, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">ELIMINATE</text>
  <text x="200" y="295" fill="#7d8590" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Neither</text>
  
  <rect x="310" y="210" width="180" height="130" rx="8" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b"/>
  <text x="400" y="265" fill="#fff" font-family="Inter, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">DELEGATE</text>
  <text x="400" y="245" fill="#7d8590" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Not Important / Urgent</text>
</svg>
