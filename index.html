<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadership Blueprint | Simple, Actionable Models</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #2563eb;
            --gray: #f4f4f5;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text);
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            background: var(--bg);
        }
        header {
            border-bottom: 2px solid var(--gray);
            margin-bottom: 3rem;
            padding-bottom: 1rem;
        }
        h1 { font-size: 2rem; margin: 0; letter-spacing: -0.025em; }
        p.subtitle { color: #666; margin-top: 0.5rem; }
        .model-card {
            background: var(--gray);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            transition: transform 0.2s;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .model-card:hover { transform: translateY(-2px); }
        .model-card h2 { margin-top: 0; color: var(--accent); }
        .tag {
            font-size: 0.75rem;
            background: #e5e7eb;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }
        footer {
            margin-top: 5rem;
            font-size: 0.875rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Leadership Blueprint</h1>
        <p class="subtitle">Actionable frameworks for daily work. New model every 48 hours.</p>
    </header>

    <main id="model-list">
        <!-- New models will be injected here -->
        <a href="models/situational-leadership.html" class="model-card">
            <span class="tag">Active</span>
            <h2>Situational Leadership (Hersey-Blanchard)</h2>
            <p>Adapt your management style to the maturity and skill level of your team members.</p>
        </a>
    </main>

    <footer>
        &copy; 2026 Leadership Blueprint. Original content curated by Aurora.
    </footer>
</body>
</html>
