<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#161b22" rx="12"/>
  
  <!-- Status -->
  <rect x="50" y="80" width="90" height="150" rx="8" fill="rgba(56, 189, 248, 0.1)" stroke="#38bdf8" stroke-width="2"/>
  <text x="95" y="255" fill="#38bdf8" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">STATUS</text>
  
  <!-- Certainty -->
  <rect x="155" y="80" width="90" height="150" rx="8" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="2"/>
  <text x="200" y="255" fill="#22c55e" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">CERTAINTY</text>
  
  <!-- Autonomy -->
  <rect x="260" y="80" width="90" height="150" rx="8" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b" stroke-width="2"/>
  <text x="305" y="255" fill="#f59e0b" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">AUTONOMY</text>
  
  <!-- Relatedness -->
  <rect x="365" y="80" width="90" height="150" rx="8" fill="rgba(129, 140, 248, 0.1)" stroke="#818cf8" stroke-width="2"/>
  <text x="410" y="255" fill="#818cf8" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">RELATEDNESS</text>
  
  <!-- Fairness -->
  <rect x="470" y="80" width="90" height="150" rx="8" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="2"/>
  <text x="515" y="255" fill="#ef4444" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">FAIRNESS</text>

  <text x="300" y="350" fill="#7d8590" font-family="Inter, sans-serif" font-size="12" text-anchor="middle">THE FIVE DOMAINS OF SOCIAL EXPERIENCE</text>
</svg>
